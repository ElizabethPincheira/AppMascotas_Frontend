<section class="login-page">
  <div class="login-layout">
    <section class="login-form-panel">
      <div class="login-form-shell">
        <div class="login-brand">
          <span class="login-brand__name">Circulo Animal</span>
        </div>

        <div class="login-copy">
          <h1>Inicia sesion</h1>
          <p>Accede a tu cuenta para continuar.</p>
        </div>

        <form class="login-form" (ngSubmit)="login()">
          <div class="login-field">
            <label for="login-email">Correo electronico</label>
            <input
              id="login-email"
              type="email"
              name="email"
              placeholder="nombre@correo.com"
              [(ngModel)]="email"
              [disabled]="enviandoFormulario"
              required>
          </div>

          <div class="login-field">
            <div class="login-field__header">
              <label for="login-password">Contrasena</label>
              <a routerLink="/recuperar-password" class="login-help__link">Olvide mi contrasena</a>
            </div>
            <input
              id="login-password"
              type="password"
              name="password"
              placeholder="********"
              [(ngModel)]="password"
              [disabled]="enviandoFormulario"
              required>
          </div>

          <button
            type="submit"
            class="login-button"
            [disabled]="enviandoFormulario || !formularioCompleto">
            <span class="spinner-border spinner-border-sm" role="status" *ngIf="enviandoFormulario"></span>
            <span>{{ enviandoFormulario ? 'Ingresando...' : 'Iniciar sesion' }}</span>
          </button>
        </form>

        <div class="switch-auth">
          <span>Aun no tienes cuenta?</span>
          <a routerLink="/register" class="switch-auth__link">Crear cuenta</a>
        </div>
      </div>
    </section>

    <aside class="login-visual-panel">
      <div class="login-visual-backdrop"></div>

      <div class="login-visual-content">
        <div class="login-visual-icon" aria-hidden="true">CA</div>

        <div class="login-visual-frame">
          <img
            src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=1200&q=80"
            alt="Perro y gato compartiendo un momento tranquilo en un espacio luminoso">
        </div>

        <article class="login-quote">
          <span class="login-quote__eyebrow">Una comunidad que acompana</span>
          <h2>"Cada publicacion puede acercar a una mascota a su hogar."</h2>
          <div class="login-quote__author">
            <div class="login-quote__avatar">CA</div>
            <div>
              <strong>Circulo Animal</strong>
              <p>Red de apoyo para mascotas y familias</p>
            </div>
          </div>
        </article>
      </div>
    </aside>
  </div>
</section>
