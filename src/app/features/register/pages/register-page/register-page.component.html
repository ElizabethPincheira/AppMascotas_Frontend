<div class="container text-center">
  <div class="row align-items-center">

    <div class="coltext col-12 col-md-6">
      Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </div>

    <div class="colform col-12 col-md-6">
      <div>
        <form (ngSubmit)="register()">
          <div class="mb-3">
            <label for="exampleInputName" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="exampleInputName" name="nombre" [(ngModel)]="nombre">
          </div>

          <div class="mb-3">
            <label for="exampleInputRegiones" class="form-label">Region</label>
            <select
              class="form-control"
              id="exampleInputRegiones"
              name="regiones"
              [(ngModel)]="regionSeleccionada"
              (ngModelChange)="onRegionChange()"
              [disabled]="cargandoRegiones"
              required>
              <option value="">Seleccione una región</option>
              <option *ngFor="let region of regiones" [value]="region">{{ region }}</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="exampleInputProvincia" class="form-label">Provincia</label>
            <select
              class="form-control"
              id="exampleInputProvincia"
              name="provincias"
              [(ngModel)]="provinciaSeleccionada"
              (ngModelChange)="onProvinciaChange()"
              [disabled]="!regionSeleccionada || cargandoProvincias"
              required>
              <option value="">Seleccione una provincia</option>
              <option *ngFor="let provincia of provincias" [value]="provincia">{{ provincia }}</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="exampleInputComuna" class="form-label">Comuna</label>
            <select
              class="form-control"
              id="exampleInputComuna"
              name="comunas"
              [(ngModel)]="comunaSeleccionada"
              (ngModelChange)="onComunaChange()"
              [disabled]="!provinciaSeleccionada || cargandoComunas"
              required>
              <option value="">Seleccione una comuna</option>
              <option *ngFor="let comuna of comunas" [value]="comuna">{{ comuna }}</option>
            </select>
          </div>



          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="email"
              [(ngModel)]="email">
            <div id="emailHelp" class="form-text">
              Nunca compartiremos tu correo electrónico con nadie más.</div>
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="exampleInputPassword1" name="password"
              [(ngModel)]="password">
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Aceptar términos y condiciones</label>
          </div>
          <button type="submit" class="btn btn-primary" [disabled]="enviandoFormulario">
            Registrarse
          </button>
        </form>
      </div>
    </div>


  </div>
</div>
