<section class="pets-showcase">
  <div class="pets-shell">
    <div class="section-block" *ngIf="mascotasPerdidasRecientes.length > 0">
      <div class="section-heading">
        <div>
          <h2>Mascotas Perdidas Recientes</h2>
          <p>Casos visibles en la comunidad para ayudar a reencontrarlas.</p>
        </div>
        <button class="more-link" type="button">Ver mas</button>
      </div>

      <div class="cards-grid">
        <app-card-mascota
          *ngFor="let mascota of mascotasPerdidasRecientes; trackBy: trackById"
          [mascota]="mascota">
        </app-card-mascota>
      </div>
    </div>

    <div class="section-block" *ngIf="mascotasEnAdopcion.length > 0">
      <div class="section-heading">
        <div>
          <h2>En Adopcion</h2>
          <p>Compañeros listos para encontrar un nuevo hogar.</p>
        </div>
        <button class="more-link" type="button">Ver mas</button>
      </div>

      <div class="cards-grid">
        <app-card-mascota
          *ngFor="let mascota of mascotasEnAdopcion; trackBy: trackById"
          [mascota]="mascota">
        </app-card-mascota>
      </div>
    </div>

    <div class="empty-state" *ngIf="!hasAnySectionData()">
      <h2>Estamos preparando esta vitrina</h2>
      <p>Cuando haya mascotas cargadas, esta pagina mostrara las secciones de perdidas y adopcion con este nuevo diseño.</p>
    </div>
  </div>
</section>
