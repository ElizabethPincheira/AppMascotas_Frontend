<app-header></app-header>

<main>
  <section
    class="verification-banner"
    *ngIf="(verificationBanner$ | async) && user?.email_verified === false">
    <div class="verification-banner__content">
      <div>
        <strong>Tu cuenta no está verificada.</strong>
        <p>Confirma tu correo para activar todas las funciones de Circulo Animal.</p>
      </div>

      <div class="verification-banner__actions">
        <a
          class="verification-banner__button verification-banner__button--ghost"
          [routerLink]="['/verificar-email']"
          [queryParams]="{ email: user?.email }">
          Ingresar codigo
        </a>
        <button
          type="button"
          class="verification-banner__button"
          (click)="reenviarVerificacion()"
          [disabled]="reenviandoVerificacion">
          {{ reenviandoVerificacion ? 'Reenviando...' : 'Reenviar codigo' }}
        </button>
      </div>
    </div>
  </section>

  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>
