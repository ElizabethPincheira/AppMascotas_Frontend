name: Deploy Front to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t jormeno2020/circuloanimal:0.0.1 -t jormeno2020/circuloanimal:latest .
          docker push jormeno2020/circuloanimal:0.0.1
          docker push jormeno2020/circuloanimal:latest

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy en Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /root/redx

            echo "Servicios disponibles:"
            docker compose config --services

            echo "Haciendo pull..."
            docker compose pull

            echo "Levantando stack..."
            docker compose up -d --remove-orphans

            echo "Contenedores activos:"
            docker compose ps

            echo "Logs recientes:"
            docker compose logs --tail=100

            docker image prune -f || true