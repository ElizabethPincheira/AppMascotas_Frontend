name: Deploy Front to DigitalOcean

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        env:
          DOCKER_USER:  ${{ secrets.DOCKER_USER }}
          DOCKER_PASS:  ${{ secrets.DOCKER_PASS }}
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
          echo "Login exitoso a Docker Hub"

      - name: Build and Push Docker Image
        run: |
          docker build -t jormeno2020/circuloanimal:0.0.1 -t jormeno2020/circuloanimal:latest .
          docker push jormeno2020/circuloanimal:0.0.1
          docker push jormeno2020/circuloanimal:latest

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy only circuloanimal service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /root/redx

            # NOMBRE DEL SERVICIO EN TU docker-compose.yml
            SERVICE_NAME=circuloAnimalFront              # <-- cámbialo si en tu compose se llama distinto
            IMAGE_NAME=jormeno2020/circuloanimal

            echo "Haciendo pull de la última imagen..."
            docker compose pull $SERVICE_NAME || docker-compose pull $SERVICE_NAME

            echo "Levantando solo $SERVICE_NAME (sin tocar deps)..."
            docker compose up -d --no-deps $SERVICE_NAME || docker-compose up -d --no-deps $SERVICE_NAME

            echo "Esperando 8s..."
            sleep 8

            echo "Estado del servicio:"
            docker ps --filter "name=${SERVICE_NAME}"

            echo "Logs recientes:"
            docker compose logs --tail=100 $SERVICE_NAME || docker-compose logs --tail=100 $SERVICE_NAME

            echo "Limpieza de imágenes huérfanas (opcional)..."
            docker image prune -f || true

